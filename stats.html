<!DOCTYPE html>
<html lang="pl">
<head>
<link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Statystyki strony</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
    --bg:#0f0f0f;
    --card:#171717;
    --gold:#d6b36a;
    --text:#ffffff;
    --muted:#9e9e9e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:var(--bg);
    color:white;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:40px;
    font-size:2.5rem;
}

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:25px;

    margin-bottom:50px;

}

.card{

    background:var(--card);

    border-radius:18px;

    padding:30px;

    text-align:center;

    border:1px solid rgba(255,255,255,.06);

    transition:.25s;

}

.card:hover{

    transform:translateY(-4px);

}

.label{

    color:var(--muted);

    margin-bottom:15px;

    font-size:1rem;

}

.value{

    font-size:2.6rem;

    color:var(--gold);

    font-weight:700;

}

.chart{

    background:var(--card);

    border-radius:18px;

    padding:30px;

    margin-bottom:40px;

}

.table{

    background:var(--card);

    border-radius:18px;

    overflow:hidden;

}

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#202020;

    color:var(--gold);

    padding:18px;

    text-align:left;

}

td{

    padding:16px 18px;

    border-top:1px solid rgba(255,255,255,.05);

}

tr:hover{

    background:#1d1d1d;

}

@media(max-width:700px){

body{

padding:20px;

}

.value{

font-size:2rem;

}

}
    .chart{
    background:var(--card);
    border-radius:18px;
    padding:30px;
    margin-bottom:40px;
    height:420px;
}

@media(max-width:700px){

.chart{
    padding:15px;
    height:320px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>📊 Statystyki strony</h1>

<div class="cards">

<div class="card">

<div class="label">
Łącznie odwiedzin
</div>

<div id="total" class="value">0</div>

<div id="since"
style="margin-top:12px;color:#9e9e9e;font-size:.9rem;">
od ...
</div>

</div>
<div class="card">

<div class="label">
Dzisiaj
</div>

<div id="today" class="value">0</div>

</div>

<div class="card">

<div class="label">
Wczoraj
</div>

<div id="yesterday" class="value">0</div>

</div>

<div class="card">

<div class="label">
Ten miesiąc
</div>

<div id="month" class="value">0</div>

</div>

</div>

<div class="chart">

<canvas id="chart"></canvas>

</div>

<div class="table">

<table>

<thead>

<tr>

<th>Data</th>

<th>Odwiedziny</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script>

fetch("https://salonsamochodowy.5v.pl/api/stats.php")

.then(r=>r.json())

.then(data=>{

document.getElementById("total").textContent=data.total;
document.getElementById("today").textContent=data.today;
document.getElementById("yesterday").textContent=data.yesterday;
document.getElementById("month").textContent=data.month;

document.getElementById("since").textContent =
"od " + new Date(data.since).toLocaleDateString("pl-PL");

const labels=data.chart.map(x=>
new Date(x.date).toLocaleDateString("pl-PL")
);

const visits=data.chart.map(x=>x.visits);

new Chart(document.getElementById("chart"),{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Odwiedziny",

data:visits,

borderColor:"#d6b36a",

backgroundColor:"rgba(214,179,106,.15)",

fill:true,

tension:.35,

pointRadius: window.innerWidth < 700 ? 2 : 4,
pointHoverRadius:6,
borderWidth:3,

}]

},

options: {
    responsive: true,
    maintainAspectRatio: false,

    plugins: {
        legend: {
            position: "bottom",
            labels: {
                color: "white",
                boxWidth: 30,
                padding: 15
            }
        }
    },

    scales: {
        x: {
            ticks: {
                color: "white",
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: window.innerWidth < 700 ? 4 : 10
            },
            grid: {
                display: false
            }
        },

        y: {
            beginAtZero: true,
            ticks: {
                color: "white",
                precision: 0
            },
            grid: {
                color: "rgba(255,255,255,.08)"
            }
        }
    }
},
    grid:{
color:"rgba(255,255,255,.08)"
}
},

y:{
beginAtZero:true,
ticks:{
color:"white",
precision:0
},
grid:{
color:"rgba(255,255,255,.08)"
}
}

}

}

});

const tbody=document.getElementById("tableBody");

data.chart
.slice()
.reverse()
.forEach(item=>{

tbody.innerHTML += `
<tr>
<td>${new Date(item.date).toLocaleDateString("pl-PL")}</td>
<td>${item.visits}</td>
</tr>
`;

});

});

</script>
    
</body>

</html>
